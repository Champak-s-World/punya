<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Yagyas</title>
  <meta name="description" content="Explore yagya arrangements and sacred fire ritual services for families, groups and special occasions." />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/popout.css?v=99" />
    <link rel="stylesheet" href="assets/css/pp-nav.css" />
  </head>
  <body data-collection="yagyas" data-json="data/master/yagyas.json">
    <div data-include="includes/header.html"></div>

    <main class="pp-container">
      <section class="pp-card pp-pad" style="margin-top:12px">
        <div class="pp-split">
          <div>
            <div class="pp-mini" id="cpStatus">Loading…</div>
            <h1 class="pp-h1" id="cpTitle"></h1>
            <div class="pp-muted" id="cpSubtitle"></div>
          </div>

          <div class="pp-actions">
            <button class="pp-btn pp-btn--ghost" id="cpLang" type="button">HI</button>
          </div>
        </div>

        <div class="pp-actions" style="margin-top:12px">
          <input
            id="cpQuery"
            class="pp-input"
            style="flex:1"
            placeholder="Type 3+ characters to search…"
          />
          <select id="cpTagFilter" class="pp-input">
            <option value="">All tags</option>
          </select>
          <button class="pp-btn" id="cpSearchBtn" type="button">Search</button>
          <button class="pp-btn pp-btn--ghost" id="cpClearBtn" type="button">Clear</button>
        </div>
      </section>

      <section class="pp-card pp-pad" style="margin-top:12px">
        <div class="pp-h2">Featured</div>
        <div class="pp-grid" id="cpFeatured" style="margin-top:12px"></div>
      </section>

      <section class="pp-card pp-pad" style="margin-top:12px">
        <div class="pp-h2">All Yagyas</div>
        <div class="pp-grid" id="cpList" style="margin-top:12px"></div>
      </section>
    </main>

    <div data-include="includes/footer.html"></div>

    <script>
      window.__CP_PAGE_TITLE = {
        "en": "Yagyas & Havan",
        "hi": "यज्ञ व हवन"
};
      window.__CP_PAGE_SUB = {
        "en": "Shatchandi, Sahasra Chandi, Dashmahavidya Jaap and more.",
        "hi": "शतचंडी, सहस्र चंडी, दशमहाविद्या जाप आदि।"
};
    </script>

    <script src="assets/js/includes.js" defer></script>
    <script src="assets/js/pp-nav.js" defer></script>
    <script src="assets/js/pp-theme.js" defer></script>
    <script src="assets/js/site-config.js" defer></script>
    <script src="assets/js/lang.js" defer></script>
    <script src="assets/js/render.js" defer></script>
    <script src="assets/js/popout.js" defer></script>
    <script src="assets/js/content-pages.js" defer></script>
    <script src="assets/js/i18n.js" defer></script>
    <script src="assets/js/site-translate.js" defer></script>
  </body>
</html>
