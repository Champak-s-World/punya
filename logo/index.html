<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Punya Yatra — Logo Pack</title>

<style>
:root{
  --bg:#fff8eb;
  --card:#ffffff;
  --ink:#1f2937;
  --muted:#6b7280;
  --brand:#d97706;
  --brand2:#f59e0b;
  --line:#ead7b0;
}

body{
  margin:0;
  font-family:system-ui,Arial;
  background:var(--bg);
  color:var(--ink);
}

header{
  padding:20px;
  background:linear-gradient(90deg,var(--brand),var(--brand2));
  color:white;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h2{ margin-top:0; }

.logo-box{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  border:1px dashed var(--line);
  border-radius:12px;
  background:#fffdf7;
  overflow:auto;
}

button{
  margin-top:15px;
  background:var(--brand);
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#b45309;
}
</style>
</head>

<body>

<header>
  <h1>Punya Yatra Logo Pack 🎨</h1>
</header>

<div class="container">

<!-- MAIN -->
<div class="card">
<h2>Main Logo</h2>
<div class="logo-box" id="mainLogo">
<svg viewBox="0 0 500 500">
  <circle cx="250" cy="160" r="70" fill="#f59e0b"/>
  <path d="M200 220 L250 150 L300 220 Z" fill="#d97706"/>
  <rect x="230" y="220" width="40" height="60" fill="#d97706"/>
  <path d="M120 340 Q240 320 360 340" stroke="#d97706" stroke-width="6" fill="none"/>
  <text x="250" y="410" text-anchor="middle" font-size="36">Punya Yatra</text>
  <text x="250" y="450" text-anchor="middle" font-size="28">पुण्य यात्रा</text>
</svg>
</div>
<button onclick="copySVG('mainLogo')">Copy SVG</button>
</div>

<!-- EN -->
<div class="card">
<h2>English Logo</h2>
<div class="logo-box" id="enLogo">
<svg viewBox="0 0 500 400">
  <circle cx="250" cy="130" r="60" fill="#f59e0b"/>
  <path d="M210 180 L250 120 L290 180 Z" fill="#d97706"/>
  <text x="250" y="320" text-anchor="middle" font-size="36">Punya Yatra</text>
</svg>
</div>
<button onclick="copySVG('enLogo')">Copy SVG</button>
</div>

<!-- BADGE -->
<div class="card">
<h2>Badge Logo</h2>
<div class="logo-box" id="badgeLogo">
<svg viewBox="0 0 300 300">
  <circle cx="150" cy="150" r="140" fill="#fff8eb" stroke="#d97706" stroke-width="6"/>
  <circle cx="150" cy="100" r="40" fill="#f59e0b"/>
  <text x="150" y="240" text-anchor="middle">Punya Yatra</text>
</svg>
</div>
<button onclick="copySVG('badgeLogo')">Copy SVG</button>
</div>

<!-- ICON -->
<div class="card">
<h2>Minimal Icon</h2>
<div class="logo-box" id="iconLogo">
<svg viewBox="0 0 200 200">
  <circle cx="100" cy="70" r="35" fill="#f59e0b"/>
  <text x="100" y="180" text-anchor="middle">PY</text>
</svg>
</div>
<button onclick="copySVG('iconLogo')">Copy SVG</button>
</div>

<!-- ANIMATED -->
<div class="card">
<h2>Animated Premium Logo 🔥</h2>
<div class="logo-box" id="animatedLogo">

<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">

<style>
.sun { animation:pulse 3s infinite; transform-origin:center; }
@keyframes pulse {
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.1);}
}
.wave{ animation:wave 6s infinite; }
@keyframes wave{
  0%,100%{transform:translateX(0);}
  50%{transform:translateX(20px);}
}
</style>

<circle cx="150" cy="100" r="50" fill="#f59e0b" class="sun"/>

<path d="M120 150 L150 100 L180 150 Z" fill="#d97706"/>
<rect x="135" y="150" width="30" height="40" fill="#d97706"/>

<path d="M50 220 Q150 200 250 220 T450 220" stroke="#d97706" stroke-width="5" fill="none" class="wave"/>

<text x="300" y="140" font-size="40" fill="#1f2937">Punya Yatra</text>
<text x="300" y="180" font-size="24" fill="#6b7280">पुण्य यात्रा</text>

</svg>

</div>
<button onclick="copySVG('animatedLogo')">Copy SVG</button>
</div>

</div>

<script>
function copySVG(id){
  const svg = document.querySelector("#"+id+" svg");
  navigator.clipboard.writeText(svg.outerHTML);
  alert("SVG copied!");
}
</script>

</body>
</html>
