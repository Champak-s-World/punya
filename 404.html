<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Page Not Found</title>
<meta name="theme-color" content="#ea580c"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#fffaf2;--panel:#ffffff;--soft:#fff0dd;--text:#1f2937;--muted:#6b7280;--line:#fed7aa;--accent:#ea580c;--accent2:#c2410c;--shadow:0 16px 40px rgba(15,23,42,.08)}
*{box-sizing:border-box}html,body{min-height:100%}body{margin:0;font-family:"Inter",system-ui,sans-serif;background:linear-gradient(135deg,#ffedd5,#fff7ed,#ffffff);color:var(--text)}
.container{width:min(1100px,calc(100% - 32px));margin:auto}.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:60px 0}
.card{background:var(--panel);border:1px solid var(--line);border-radius:28px;padding:48px 36px;box-shadow:var(--shadow);max-width:720px;margin:auto}
.badge{display:inline-block;padding:8px 14px;border-radius:999px;background:var(--soft);border:1px solid var(--line);color:var(--accent2);font-weight:700;margin-bottom:18px}
h1{font-family:"DM Sans",sans-serif;font-size:clamp(2.5rem,6vw,4rem);margin:0 0 12px;line-height:1.08;letter-spacing:-.02em}p{color:var(--muted);font-size:1.05rem;margin:0}
.actions{margin-top:26px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}.btn{padding:14px 20px;border-radius:16px;font-weight:700;text-decoration:none;border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;gap:10px}.btn-primary{background:var(--accent);color:#fff}.btn-secondary{background:#fff;color:var(--text)}.footer{margin-top:24px;color:var(--muted);font-size:.9rem}
</style>
</head>
<body>
<section class="hero">
<div class="container">
<div class="card">
<div class="badge">404 Error</div>
<h1>Page Not Found</h1>
<p>The page you tried to open does not exist or the link may be incorrect. Use one of the options below to continue exploring the site.</p>
<div class="actions">
<a class="btn btn-primary" href="./">Go to Homepage</a>
<a class="btn btn-secondary" href="./tours.html">Explore Tours</a>
<a class="btn btn-secondary" href="./city-journey.html">Move Through City</a>
</div>
<div class="footer">If you reached here from a broken link, please return to the homepage.</div>
</div>
</div>
</section>
  <script src="assets/js/lang.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/site-translate.js"></script>
</body>
</html>
